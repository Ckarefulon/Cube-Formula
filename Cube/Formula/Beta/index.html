	<title>魔方训练</title>

<body>
	<main class="appShell">
		<nav id="modeNav" class="modeNav bottomNav" aria-label="模式导航">
			<button class="modeNavBtn isActive" type="button" data-mode="practice" aria-current="page"><span class="modeIcon trainIcon" aria-hidden="true"></span><span class="navLabel">训练</span></button>
			<button class="modeNavBtn" type="button" data-mode="memory"><span class="modeIcon memoryIcon" aria-hidden="true"></span><span class="navLabel">记忆</span></button>
			<button class="modeNavBtn operationNavButton" type="button" title="展开操作面板" aria-label="展开操作面板" data-action-panel-toggle aria-controls="panelOverlay" aria-expanded="false"><span class="operationChevron" aria-hidden="true">《</span><span class="navLabel">操作</span></button>
			<button class="modeNavBtn" type="button" data-mode="formula"><span class="modeIcon formulaModeIcon" aria-hidden="true"></span><span class="navLabel">制作</span></button>
			<button class="modeNavBtn" type="button" data-mode="library"><span class="modeIcon libraryIcon" aria-hidden="true"></span><span class="navLabel">公式库</span></button>
		</nav>
		<section class="cubeArea" aria-label="虚拟魔方">
			<div class="topBar">
				<div id="modeSwitcher" class="brand">
					<button id="modeCurrent" class="modeOption modeCurrent" type="button" aria-haspopup="true" aria-expanded="false">
						<span id="modeIcon" class="modeIcon trainIcon" aria-hidden="true">
						<span></span><span></span><span></span>
						<span></span><span></span><span></span>
						<span></span><span></span><span></span>
						</span>
						<span id="modeLabel" class="modeText">训练模式</span>
						<span class="modeChevron" aria-hidden="true"></span>
					</button>
					<div id="modeMenu" class="modeMenu" role="menu">
						<button class="modeOption" type="button" data-mode="practice" role="menuitem">
							<span class="modeIcon trainIcon" aria-hidden="true"></span>
							<span class="modeText">训练模式</span>
						</button>
						<button class="modeOption" type="button" data-mode="formula" role="menuitem">
							<span class="modeIcon formulaModeIcon" aria-hidden="true"></span>
							<span class="modeText">公式制作</span>
						</button>
						<button class="modeOption" type="button" data-mode="library" role="menuitem">
							<span class="modeIcon libraryIcon" aria-hidden="true"></span>
							<span class="modeText">公式库</span>
						</button>
					</div>
				</div>
				<div class="topActions"></div>
			</div>
			<div id="cubeStage"></div>
			<section id="keyDrawer" class="keyDrawer" aria-label="手动操作键盘" aria-hidden="true">
				<button id="keyHandle" class="keyHandle" type="button" aria-label="关闭键盘" title="拖动切换大小，点击关闭键盘"></button>
				<div id="keyBody" class="keyBody"></div>
			</section>
			<div id="practiceSolvedCheck" class="practiceSolvedCheck" aria-hidden="true"></div>
		</section>
		<button id="keyToggle" class="keyToggle" type="button" aria-label="打开键盘" title="打开键盘" aria-controls="keyDrawer" aria-expanded="false">
			<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="2.5" y="5.5" width="19" height="13" rx="2.5"></rect><path d="M6 9h.01M10 9h.01M14 9h.01M18 9h.01M6 13h.01M10 13h.01M14 13h.01M18 13h.01M7 16h10"></path></svg>
		</button>

		<aside class="modeView" aria-live="polite"></aside>

		<aside id="sideNav" class="modeNav sideNav" aria-label="左侧导航" aria-hidden="true">
			<button class="modeNavBtn isActive" type="button" title="训练" aria-label="训练" data-mode="practice" aria-current="page"><span class="modeIcon trainIcon" aria-hidden="true"></span><span class="navLabel">训练</span></button>
			<button class="modeNavBtn" type="button" title="记忆" aria-label="记忆" data-mode="memory"><span class="modeIcon memoryIcon" aria-hidden="true"></span><span class="navLabel">记忆</span></button>
			<button class="modeNavBtn operationNavButton" type="button" title="展开操作面板" aria-label="展开操作面板" data-action-panel-toggle aria-controls="panelOverlay" aria-expanded="false"><span class="operationChevron" aria-hidden="true">《</span><span class="navLabel">操作</span></button>
			<button class="modeNavBtn" type="button" title="公式制作" aria-label="公式制作" data-mode="formula"><span class="modeIcon formulaModeIcon" aria-hidden="true"></span><span class="navLabel">制作</span></button>
			<button class="modeNavBtn" type="button" title="公式库" aria-label="公式库" data-mode="library"><span class="modeIcon libraryIcon" aria-hidden="true"></span><span class="navLabel">公式库</span></button>
		</aside>
	</main>
	<div id="sideNavScrim" class="sideNavScrim" aria-hidden="true"></div>
	<div id="panelOverlay" class="panelOverlay" aria-hidden="true">
		<section class="panelDrawer" role="dialog" aria-modal="true" aria-label="操作面板">
			<button id="panelHandle" class="panelHandle" type="button" aria-label="关闭操作面板" title="拖动或点击关闭操作面板"></button>
			<div class="panelMain">
			<header class="panelHead">
				<button id="seamlessToggleBtn" class="seamlessToggle" type="button" title="切换无缝模式：色块变大无空隙，隐藏色块显示为不透明灰色"></button>
				<button id="connectBtn" class="connectPill" type="button" title="点击连接或断开魔方"><span class="connectLabel">连接魔方</span></button><span id="statusPill" class="visuallyHidden" data-state="idle"></span>
			</header>
			<div class="panelContent">
				<section class="globalOps"><div class="globalOpsGrid">
					<button id="resetBtn" class="button secondary" type="button">重置视图</button>
					<button id="customFinalStateBtn" class="button secondary" type="button">自定义状态</button>
				</div></section>
				<section class="modeOps"><div id="modeOpsBody" class="modeOpsBody"></div></section>
			</div>
			</div>
		</section>
	</div>
</body>
