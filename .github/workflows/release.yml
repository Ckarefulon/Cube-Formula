name: 自动发布 Release

on:
  push:
    branches:
      - main
    paths:
      - 'Changelog.md'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 提取最新版本号及上一版本号
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(sed -nE 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/p' Changelog.md | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "没有在 Changelog.md 中找到版本号"
            exit 1
          fi

          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          PREV_VERSION=""
          if [ -n "$PREV_TAG" ]; then
            PREV_VERSION=$(echo "$PREV_TAG" | sed 's/^v//')
          fi

          RELEASE_TAG="v$VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

          echo "提取到版本号: $VERSION"
          echo "上一个 Release: $PREV_VERSION"
          echo "Release 显示标签: $RELEASE_TAG"

      - name: 提取并合并该版本线内的更新内容
        run: |
          python3 - <<'PY'
          import re
          import os
          from collections import OrderedDict

          version = os.environ['VERSION']
          prev_version = os.environ.get('PREV_VERSION', '')
          current_mm = '.'.join(version.split('.')[:2])

          with open('Changelog.md', 'r', encoding='utf-8') as f:
              content = f.read()

          # 按版本标题切分，忽略第一个部分（Unreleased 之前的内容）
          parts = re.split(r'\n## \[', content)
          sections = []
          for part in parts[1:]:
              m = re.match(r'^([^\]]+)\]', part)
              if m:
                  sections.append((m.group(1), part))

          # 收集同主次版本的版本记录（当前版本为文件中的最新版）
          target_sections = []
          for ver, body in sections:
              vm = '.'.join(ver.split('.')[:2])
              if vm == current_mm:
                  target_sections.append((ver, body))

          # 按旧到新排序
          target_sections.reverse()

          # 解析各版本的变更类型与条目
          type_items = OrderedDict()
          type_order = ['Added', 'Changed', 'Deprecated', 'Removed', 'Fixed', 'Security']

          for ver, body in target_sections:
              # 去掉版本标题行
              body = re.sub(r'^[^\]]+\][^\n]*\n', '', body)
              # 按类型小节切分
              for tp in re.split(r'\n### ', body):
                  tp = tp.strip()
                  if not tp:
                      continue
                  lines = tp.split('\n')
                  type_name = lines[0].strip()
                  items = [line.strip()[2:] for line in lines[1:] if line.strip().startswith('- ')]
                  if items:
                      if type_name not in type_items:
                          type_items[type_name] = []
                      type_items[type_name].extend(items)

          # 写入 Release 正文
          with open('RELEASE_BODY.md', 'w', encoding='utf-8') as f:
              # 二级标题：上一版本 → 本版本
              if prev_version:
                  f.write(f'## {prev_version} → {version}\n\n')
              else:
                  f.write(f'## {version}\n\n')

              for type_name in type_order:
                  if type_name in type_items and type_items[type_name]:
                      f.write(f'### {type_name}\n')
                      for item in type_items[type_name]:
                          f.write(f'- {item}\n')
                      f.write('\n')
              # 追加固定顺序之外的其他类型
              for type_name, items in type_items.items():
                  if type_name not in type_order and items:
                      f.write(f'### {type_name}\n')
                      for item in items:
                          f.write(f'- {item}\n')
                      f.write('\n')
          PY

      - name: 创建或更新当前 Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.VERSION }}
          body_path: RELEASE_BODY.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
