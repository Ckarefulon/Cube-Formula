name: 部署到 Ckarefulon.github.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 拉取本仓库代码
        uses: actions/checkout@v5

      - name: 检查是否为 Beta 版本
        run: |
          VERSION=$(sed -nE 's/^## \[([0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?)\].*/\1/p' Changelog.md | head -n 1)
          if echo "$VERSION" | grep -q "\-beta"; then
            echo "检测到 Beta 版本: $VERSION，将部署到 Beta 目录"
            echo "IS_BETA=true" >> $GITHUB_ENV
          fi

      - name: 拉取目标仓库代码
        uses: actions/checkout@v5
        with:
          repository: Ckarefulon/Ckarefulon.github.io
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: target-repo

      - name: 清空目标目录并复制文件
        run: |
          if [ "$IS_BETA" = "true" ]; then
            TARGET_DIR="target-repo/Cube/Formula/Beta"
          else
            TARGET_DIR="target-repo/Cube/Formula"
          fi
          mkdir -p "$TARGET_DIR"
          find "$TARGET_DIR" -mindepth 1 -not -name '.git' -exec rm -rf {} + 2>/dev/null || true
          rsync -av \
            --exclude='.*' \
            --exclude='/nav' \
            --exclude='/favicon.svg' \
            --exclude='/README.md' \
            --exclude='target-repo' \
            ./ "$TARGET_DIR/"

      - name: 提交并推送
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "没有变更，跳过提交"
          else
            git commit -m "从 Cube-Formula 自动同步"
            git push
          fi